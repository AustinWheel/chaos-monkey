name: pe-hackathon-ops-dashboard
region: nyc

services:
  - name: dashboard
    github:
      repo: AustinWheel/PE-Hackathon-Template-2026
      branch: main
      deploy_on_push: true
    dockerfile_path: ops-dashboard/Dockerfile
    source_dir: ops-dashboard
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /instances
      initial_delay_seconds: 15
      period_seconds: 10
      timeout_seconds: 5
      failure_threshold: 3
