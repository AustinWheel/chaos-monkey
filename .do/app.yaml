name: pe-hackathon
region: nyc

services:
  - name: api
    github:
      repo: AustinWheel/chaos-monkey
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /health
    envs:
      - key: DATABASE_URL
        value: ${db.DATABASE_URL}
      - key: FLASK_DEBUG
        value: "false"

databases:
  - name: db
    cluster_name: hackathon-db
    engine: PG
    version: "16"
    production: true
