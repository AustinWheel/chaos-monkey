apiVersion: 1

groups:
  - orgId: 1
    name: Service Health
    folder: Alerts
    interval: 1m
    rules:
      - uid: service-down-prod
        title: Service Down — Prod
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: prometheus
            model:
              expr: app_up{job="flask-prod"}
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              refId: C
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
              expression: A
        for: 1m
        noDataState: OK
        labels:
          severity: critical
        annotations:
          summary: Production service is unreachable
          __dashboardUid__: overview
          __panelId__: "1"

  - orgId: 1
    name: Error Rate
    folder: Alerts
    interval: 1m
    rules:
      - uid: high-error-rate-prod
        title: High Error Rate — Prod
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                sum(rate(http_errors_total{job="flask-prod"}[2m]))
                / clamp_min(sum(rate(http_requests_total{job="flask-prod"}[2m])), 0.001)
                * 100
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              refId: C
              conditions:
                - evaluator:
                    type: gt
                    params: [10]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
              expression: A
        for: 30s
        noDataState: OK
        labels:
          severity: warning
        annotations:
          summary: "Prod error rate is above 10%"
          __dashboardUid__: overview
          __panelId__: "30"

      - uid: critical-error-rate-prod
        title: Critical Error Rate — Prod
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                sum(rate(http_errors_total{job="flask-prod"}[2m]))
                / clamp_min(sum(rate(http_requests_total{job="flask-prod"}[2m])), 0.001)
                * 100
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              refId: C
              conditions:
                - evaluator:
                    type: gt
                    params: [25]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
              expression: A
        for: 30s
        noDataState: OK
        labels:
          severity: critical
        annotations:
          summary: "Prod error rate is above 25% — possible outage"
          __dashboardUid__: overview
          __panelId__: "30"

  - orgId: 1
    name: Latency
    folder: Alerts
    interval: 1m
    rules:
      - uid: high-latency-p95
        title: High P95 Latency — Prod
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                histogram_quantile(0.95,
                  sum by (le) (rate(http_request_duration_seconds_bucket{job="flask-prod"}[5m]))
                )
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              refId: C
              conditions:
                - evaluator:
                    type: gt
                    params: [2]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
              expression: A
        for: 2m
        noDataState: OK
        labels:
          severity: warning
        annotations:
          summary: "P95 latency above 2s in production"
          __dashboardUid__: overview
          __panelId__: "20"

      - uid: high-latency-p99
        title: Extreme P99 Latency — Prod
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                histogram_quantile(0.99,
                  sum by (le) (rate(http_request_duration_seconds_bucket{job="flask-prod"}[5m]))
                )
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              refId: C
              conditions:
                - evaluator:
                    type: gt
                    params: [5]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
              expression: A
        for: 2m
        noDataState: OK
        labels:
          severity: critical
        annotations:
          summary: "P99 latency above 5s — severe degradation"
          __dashboardUid__: overview
          __panelId__: "20"

  - orgId: 1
    name: Infrastructure
    folder: Alerts
    interval: 1m
    rules:
      - uid: high-cpu-prod
        title: High CPU Usage — Prod
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: prometheus
            model:
              expr: system_cpu_percent{job="flask-prod"}
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              refId: C
              conditions:
                - evaluator:
                    type: gt
                    params: [80]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
              expression: A
        for: 2m
        noDataState: OK
        labels:
          severity: warning
        annotations:
          summary: "CPU usage above 80% on prod"
          __dashboardUid__: overview
          __panelId__: "40"

      - uid: high-memory-prod
        title: High Memory Usage — Prod
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: prometheus
            model:
              expr: system_memory_percent{job="flask-prod"}
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              refId: C
              conditions:
                - evaluator:
                    type: gt
                    params: [85]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
              expression: A
        for: 2m
        noDataState: OK
        labels:
          severity: warning
        annotations:
          summary: "Memory usage above 85% on prod"
          __dashboardUid__: overview
          __panelId__: "41"

      - uid: high-saturation-prod
        title: High Request Saturation — Prod
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: prometheus
            model:
              expr: sum(http_requests_in_flight{job="flask-prod"})
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              refId: C
              conditions:
                - evaluator:
                    type: gt
                    params: [50]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
              expression: A
        for: 1m
        noDataState: OK
        labels:
          severity: warning
        annotations:
          summary: "Over 50 in-flight requests — nearing saturation"
          __dashboardUid__: overview
          __panelId__: "44"
