global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "flask-prod"
    metrics_path: "/prom-metrics"
    scheme: https
    static_configs:
      - targets:
          - pe-hackathon-hni9m.ondigitalocean.app
        labels:
          environment: "prod"

  - job_name: "flask-staging"
    metrics_path: "/prom-metrics"
    scheme: https
    static_configs:
      - targets:
          - pe-hackathon-staging-stj5i.ondigitalocean.app
        labels:
          environment: "staging"
