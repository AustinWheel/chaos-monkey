name: CI/CD Pipeline

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests with coverage
        run: uv run pytest tests/ -v --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=70

      - name: Coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: MishaKav/pytest-coverage-comment@main
        with:
          pytest-xml-coverage-path: coverage.xml

  deploy-staging:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'

    steps:
      - name: Deploy to staging droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_DROPLET_IP }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd /opt/app
            git pull origin staging
            docker compose -f app-droplet/docker-compose.yml up -d --build

      - name: Verify staging health
        run: |
          echo "Waiting for staging to be healthy..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.STAGING_DROPLET_IP }}/health)
            if [ "$STATUS" = "200" ]; then
              echo "Staging healthy!"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Staging unhealthy after 5 minutes"
          exit 1

  deploy-prod:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to prod droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_DROPLET_IP }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd /opt/app
            git pull origin main
            docker compose -f app-droplet/docker-compose.yml up -d --build

      - name: Verify prod health
        run: |
          echo "Waiting for prod to be healthy..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.PROD_DROPLET_IP }}/health)
            if [ "$STATUS" = "200" ]; then
              echo "Prod healthy!"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Prod unhealthy after 5 minutes"
          exit 1
